name: Job Finder Pipeline

on:
  schedule:
    # 7 AM, 12 PM, 5 PM EST (= 12:00, 17:00, 22:00 UTC) — Mon–Fri
    - cron: '0 12,17,22 * * 1-5'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Write credential files
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GOOGLE_OAUTH_TOKEN:  ${{ secrets.GOOGLE_OAUTH_TOKEN }}
        run: |
          echo "$GCP_SERVICE_ACCOUNT" > backend/service_account.json
          echo "$GOOGLE_OAUTH_TOKEN"  > backend/token.json

      - name: Run pipeline
        env:
          APIFY_API_TOKEN:    ${{ secrets.APIFY_API_TOKEN }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_SENDER:       ${{ secrets.GMAIL_SENDER }}
          SHEET_EDITOR_EMAIL: ${{ secrets.SHEET_EDITOR_EMAIL }}
          SHEET_FOLDER_ID:    ${{ secrets.SHEET_FOLDER_ID }}
        run: |
          cd backend
          python3 main.py
